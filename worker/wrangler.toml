# Cloudflare Worker for ai-tracker mutating endpoints.
#
# Phase 4 deploy steps (when GitHub repo + custom domain land):
#   1. Create KV namespaces:  wrangler kv:namespace create "VOTES"
#                             wrangler kv:namespace create "RATELIMIT"
#      Paste the IDs into the [[kv_namespaces]] blocks below.
#   2. Set secrets (NOT in this file):
#        wrangler secret put GITHUB_TOKEN          # repo:write scope
#        wrangler secret put TURNSTILE_SECRET      # CF Turnstile site secret
#        wrangler secret put ANTHROPIC_API_KEY     # Haiku moderation
#   3. Update GITHUB_REPO below to <owner>/<repo>.
#   4. Bind to api.<domain> via Pages → custom routes.
#   5. wrangler deploy

name = "ai-tracker-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"
workers_dev = false

[vars]
GITHUB_REPO = "OWNER/REPO"           # TODO: fill once repo exists
QUEUE_BRANCH = "submissions/queue"
ANTHROPIC_MODEL = "claude-haiku-4-5"
MODERATION_MIN_CONFIDENCE = "0.4"
RATE_LIMIT_PER_DAY = "5"

[[kv_namespaces]]
binding = "VOTES"
id = ""                              # TODO: paste from `wrangler kv:namespace create "VOTES"`

[[kv_namespaces]]
binding = "RATELIMIT"
id = ""                              # TODO: paste from `wrangler kv:namespace create "RATELIMIT"`

# Routes attach via Cloudflare dashboard once api.<domain> exists.
# [[routes]]
# pattern = "api.<domain>/*"
# zone_name = "<domain>"
