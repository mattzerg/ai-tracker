name: watchdog

# Every 4 hours: scan open PRs labeled "queue" (submissions/queue + ingest/queue
# rolling PRs) and ping if they've sat unreviewed past 24h / 48h / 7d. Idempotent
# via a sticky comment marker — a PR only gets pinged once per threshold.
#
# Plumbing notes:
# - Slack ping requires SLACK_WEBHOOK secret (Fake Matt → Matt DM channel).
#   Without it, the watchdog still runs, but only writes the sticky comment
#   on the PR (no DM).

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const prs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: "open", per_page: 100,
            });
            const queues = prs.filter((p) => p.labels.some((l) => l.name === "queue"));
            if (!queues.length) {
              core.notice("No queue PRs open. All clear.");
              return;
            }
            const now = Date.now();
            const THRESHOLDS = [
              { hours: 24, marker: "<!-- watchdog-24h -->", msg: "queued 24h+" },
              { hours: 48, marker: "<!-- watchdog-48h -->", msg: "queued 48h+ — please review" },
              { hours: 168, marker: "<!-- watchdog-7d -->", msg: "queued 7 DAYS — escalation" },
            ];
            for (const pr of queues) {
              const lastUpdate = new Date(pr.updated_at).getTime();
              const ageH = (now - lastUpdate) / 3600000;
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number: pr.number, per_page: 100,
              });
              const seen = new Set(comments.map((c) => c.body ?? "").filter(Boolean));
              for (const t of THRESHOLDS) {
                if (ageH < t.hours) continue;
                if ([...seen].some((b) => b.includes(t.marker))) continue;
                const body = `${t.marker}\n⏰ This PR has been ${t.msg} (${ageH.toFixed(0)}h since last update).\n\nReview at ${pr.html_url}`;
                await github.rest.issues.createComment({
                  owner, repo, issue_number: pr.number, body,
                });
                core.notice(`Pinged PR #${pr.number}: ${t.msg}`);
                if (process.env.SLACK_WEBHOOK) {
                  await fetch(process.env.SLACK_WEBHOOK, {
                    method: "POST",
                    headers: { "content-type": "application/json" },
                    body: JSON.stringify({ text: `ai-tracker queue: PR #${pr.number} ${t.msg} — ${pr.html_url}` }),
                  });
                }
              }
            }
